<!-- loop out of stock text change -->
<script>
    function replaceStockText() {
        document.querySelectorAll(".stock").forEach(el => {
            if (el.textContent.includes("Nicht vorrätig")) {
                el.textContent = "Out of stock";
            }
        });
    }

    document.addEventListener("DOMContentLoaded", replaceStockText);

    const observer = new MutationObserver(replaceStockText);
    observer.observe(document.body, { childList: true, subtree: true });
</script>
